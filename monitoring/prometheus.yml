global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'trading-bot'

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Trading bot metrics endpoint
  - job_name: 'trading-bot'
    scrape_interval: 10s
    static_configs:
      - targets: ['trading-bot:8080']
    metrics_path: '/metrics'
    honor_labels: true

  # Node exporter (host metrics) — optional, enabled if deployed
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
