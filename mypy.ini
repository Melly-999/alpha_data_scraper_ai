[mypy]
python_version = 3.12
ignore_missing_imports = True
explicit_package_bases = True
exclude = (?x)(^\.venv/|^__pycache__/|^mellytrade_v3/)

# requests has no bundled stubs; suppress until types-requests is added
[mypy-requests]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

# example_runner.py uses APIs that have drifted from the actual library
# signatures (ClaudeAIIntegration, BacktestEngine kwargs, return types).
# main.py uses `from utils.config import *` which mypy cannot resolve.
# Both are entry-point / example files, not core library code.
[mypy-example_runner]
ignore_errors = True

[mypy-main]
ignore_errors = True

[mypy-ai_engine]
ignore_errors = True

[mypy-brokers.*]
ignore_errors = True

[mypy-monitoring.telegram_push]
ignore_errors = True

[mypy-notifications]
ignore_errors = True

# GITHUB_INTEGRATION_SNIPPET.py is a code snippet / quickstart guide, not a
# real module. Names and types are intentionally undefined.
[mypy-GITHUB_INTEGRATION_SNIPPET]
ignore_errors = True
