[mypy]
python_version = 3.12
ignore_missing_imports = True
exclude = (?x)(^\.venv/|^__pycache__/|^alpha_data_scraper_ai/|^api/|^brokers/|^mellytrade_v3/|^monitoring/|^daily_analysis\.py|^monthly_dividend_report\.py|^scheduler\.py|^test_parser\.py|^weekly_analysis\.py|^risk/ftmo_guard\.py)

# requests has no bundled stubs; suppress until types-requests is added
[mypy-requests]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

# example_runner.py uses APIs that have drifted from the actual library
# signatures (ClaudeAIIntegration, BacktestEngine kwargs, return types).
# main.py uses `from utils.config import *` which mypy cannot resolve.
# Both are entry-point / example files, not core library code.
[mypy-example_runner]
ignore_errors = True

[mypy-main]
ignore_errors = True

# GITHUB_INTEGRATION_SNIPPET.py is a code snippet / quickstart guide, not a
# real module. Names and types are intentionally undefined.
[mypy-GITHUB_INTEGRATION_SNIPPET]
ignore_errors = True

[mypy-brokers]
ignore_errors = True

[mypy-brokers.*]
ignore_errors = True

[mypy-monitoring]
ignore_errors = True

[mypy-monitoring.*]
ignore_errors = True
