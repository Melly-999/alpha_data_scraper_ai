<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Positions C</title>
    <link rel="stylesheet" href="../assets/mellytrade-terminal.css" />
  </head>
  <body>
    <div class="page">
      <div class="shell">
        <header class="topbar">
          <div class="brand"><div class="brand-mark">C</div><div class="brand-copy"><h1>Positions C</h1><p>Mobile-aware / touch-friendly</p></div></div>
          <div class="safety-badges"><span class="badge ok">Touch friendly</span><span class="badge ok">Display only</span></div>
        </header>
        <section class="stack">
          <div class="panel">
            <div class="panel-header"><h2>Summary</h2></div>
            <div class="metrics" style="grid-template-columns: repeat(2, minmax(0, 1fr));">
              <div class="metric"><span>Float PnL</span><strong class="positive">+12,480</strong></div>
              <div class="metric"><span>Open Count</span><strong>14</strong></div>
            </div>
          </div>
          <div class="panel">
            <div class="panel-header"><h2>Open positions</h2></div>
            <div class="list">
              <div class="list-item"><strong>EURUSD long</strong><span>+228 | managed</span></div>
              <div class="list-item"><strong>GBPUSD short</strong><span>+176 | managed</span></div>
              <div class="list-item"><strong>USDJPY long</strong><span>+408 | tight stop</span></div>
            </div>
          </div>
          <div class="panel">
            <div class="panel-header"><h2>Closed today</h2></div>
            <div class="list">
              <div class="list-item"><strong>AUDUSD</strong><span>+148 | target reached</span></div>
              <div class="list-item"><strong>USDCAD</strong><span>+94 | session close</span></div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
