<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blotter C</title>
    <link rel="stylesheet" href="../assets/mellytrade-terminal.css" />
  </head>
  <body>
    <div class="page">
      <div class="shell">
        <header class="topbar">
          <div class="brand"><div class="brand-mark">C</div><div class="brand-copy"><h1>Trade Blotter C</h1><p>Mobile-aware / touch-friendly</p></div></div>
          <div class="safety-badges"><span class="badge ok">Touch friendly</span><span class="badge ok">Display only</span></div>
        </header>
        <section class="stack">
          <div class="panel">
            <div class="panel-header"><h2>Filters</h2></div>
            <div class="filter-row"><span class="pill ok">All</span><span class="pill">Filled</span><span class="pill">Pending</span></div>
          </div>
          <div class="panel">
            <div class="list">
              <div class="list-item"><strong>09:42 EURUSD long</strong><span>Filled | Model A | 1.20</span></div>
              <div class="list-item"><strong>10:11 GBPUSD short</strong><span>Pending | Model B | 0.80</span></div>
              <div class="list-item"><strong>10:48 USDJPY long</strong><span>Queued | Risk check | 0.60</span></div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
