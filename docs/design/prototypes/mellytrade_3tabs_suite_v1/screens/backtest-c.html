<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Backtest C</title>
    <link rel="stylesheet" href="../assets/mellytrade-terminal.css" />
  </head>
  <body>
    <div class="page">
      <div class="shell">
        <header class="topbar">
          <div class="brand"><div class="brand-mark">C</div><div class="brand-copy"><h1>Backtest Lab C</h1><p>Mobile-aware / touch-friendly</p></div></div>
          <div class="safety-badges"><span class="badge ok">Tablet view</span><span class="badge ok">Read Only</span></div>
        </header>
        <section class="stack">
          <div class="panel">
            <div class="panel-header"><h2>Summary</h2></div>
            <div class="metrics" style="grid-template-columns: repeat(2, minmax(0, 1fr));">
              <div class="metric"><span>Win Rate</span><strong class="positive">64%</strong></div>
              <div class="metric"><span>Profit Factor</span><strong>1.92</strong></div>
            </div>
          </div>
          <div class="panel">
            <div class="panel-header"><h2>Configuration</h2></div>
            <div class="list">
              <div class="list-item"><strong>Strategy</strong><span>Mean reversion suite</span></div>
              <div class="list-item"><strong>Risk</strong><span>0.75%</span></div>
            </div>
          </div>
          <div class="panel">
            <div class="panel-header"><h2>Equity and drawdown</h2></div>
            <div class="grid-2">
              <div class="chart-box"><span class="label">Equity</span></div>
              <div class="chart-box"><span class="label">Drawdown</span></div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
