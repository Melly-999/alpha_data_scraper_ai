[tool:pytest]
testpaths = tests

[flake8]
max-line-length = 88
exclude =
    .git,
    .venv,
    __pycache__,
    GITHUB_INTEGRATION_SNIPPET.py
extend-ignore =
    E203,
    W503,
    E501
per-file-ignores =
    ai_engine.py:F401,F811,E722
    brokers/alpaca_broker.py:E722
    brokers/ibkr_broker.py:F403,F405,E722
    brokers/xtb_broker.py:F401,E722
    daily_analysis.py:E722,F841
    monthly_dividend_report.py:F541,F841
    risk/ftmo_guard.py:F401
    scheduler.py:F401
    test_parser.py:E722,F541
    weekly_analysis.py:E722
