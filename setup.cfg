[flake8]
max-line-length = 88
exclude =
    .git,
    .venv,
    __pycache__,
    alpha_data_scraper_ai,
    api,
    brokers,
    mellytrade_v3,
    daily_analysis.py,
    monthly_dividend_report.py,
    scheduler.py,
    test_parser.py,
    weekly_analysis.py,
    monitoring,
    risk/ftmo_guard.py,
    GITHUB_INTEGRATION_SNIPPET.py
extend-ignore =
    E203,
    W503,
    E501
