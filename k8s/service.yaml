apiVersion: v1
kind: Service
metadata:
  name: trading-bot-svc
  namespace: trading
  labels:
    app: grok-alpha-ai
    component: trading-bot
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  selector:
    app: grok-alpha-ai
    component: trading-bot
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
