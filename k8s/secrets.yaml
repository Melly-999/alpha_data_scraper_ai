# IMPORTANT: Do NOT store real secrets here.
# This template shows structure. Use sealed-secrets or Vault in production.
# Real values must be base64-encoded: echo -n "value" | base64
#
# Apply with:
#   kubectl create secret generic trading-bot-secrets \
#     --from-literal=CLAUDE_API_KEY=sk-ant-... \
#     --from-literal=NEWSAPI_KEY=... \
#     --namespace=trading
#
# Or with external-secrets operator / HashiCorp Vault.
apiVersion: v1
kind: Secret
metadata:
  name: trading-bot-secrets
  namespace: trading
  labels:
    app: grok-alpha-ai
  annotations:
    # ROTATION: Rotate all keys every 90 days
    secret/rotation-period: "90d"
type: Opaque
data:
  # base64 -n "your-actual-key" | base64
  CLAUDE_API_KEY: ""   # REQUIRED: Anthropic API key
  NEWSAPI_KEY: ""      # OPTIONAL: NewsAPI.org key
  MT5_PASSWORD: ""     # OPTIONAL: MetaTrader5 account password
