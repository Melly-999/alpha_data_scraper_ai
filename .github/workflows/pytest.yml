name: Pytest CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  QUALITY_PATHS: >-
    ai_engine.py claude_ai.py core github_integration.py indicators.py
    lstm_model.py main.py mt5_fetcher.py mt5_trader.py news_sentiment.py
    risk/risk_manager.py signal_generator.py strategy tests ensemble_combiner.py
    lstm_signal_adapter.py mcp_server.py mt5_bridge.py
  CI_TEST_PATHS: >-
    tests/test_config_runtime.py tests/test_ensemble_combiner.py
    tests/test_lstm_signal_adapter.py tests/test_mt5_bridge.py
    tests/test_mt5_trader.py tests/test_risk_manager.py

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Verify runtime imports
        run: |
          python - <<'PY'
          import importlib
          modules = [
              'numpy',
              'pandas',
              'sklearn',
              'indicators',
              'lstm_model',
              'signal_generator',
          ]
          for name in modules:
              importlib.import_module(name)
          print('Import check OK')
          PY

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -q $CI_TEST_PATHS

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run black
        run: black --check $QUALITY_PATHS

      - name: Run flake8
        run: flake8 $QUALITY_PATHS

      - name: Run mypy
        run: mypy $QUALITY_PATHS
