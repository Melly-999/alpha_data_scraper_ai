name: Pytest CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'
          cache: pip

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Verify runtime imports
        run: |
          python - <<'PY'
          import importlib
          modules = [
              'numpy',
              'pandas',
              'sklearn',
              'indicators',
              'lstm_model',
              'signal_generator',
          ]
          for name in modules:
              importlib.import_module(name)
          print('Import check OK')
          PY

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -q

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run black
        run: |
          # Only check git-tracked Python files to avoid formatting untracked workspace files
          TRACKED=$(git ls-files "*.py")
          echo "Checking $(echo "$TRACKED" | wc -l) tracked Python files"
          echo "$TRACKED" | xargs black --check --diff \
            --line-length 88 --target-version py312 \
            > /tmp/black.diff 2>&1 || {
            DIFF=$(cat /tmp/black.diff)
            echo "::error title=Black diff::$(printf '%s' "$DIFF" | head -c 65000)"
            printf '%s\n' "$DIFF" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Run flake8
        run: flake8 .

      - name: Run mypy
        run: mypy .
