name: Pytest CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'
          cache: pip

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Verify runtime imports
        run: |
          python - <<'PY'
          import importlib
          modules = [
              'numpy',
              'pandas',
              'sklearn',
              'indicators',
              'lstm_model',
              'signal_generator',
          ]
          for name in modules:
              importlib.import_module(name)
          print('Import check OK')
          PY

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -q

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Verify black version
        run: |
          pip show black
          echo "Python files found:"
          find . -name "*.py" | grep -v "__pycache__\|.git\|.venv" | sort

      - name: Run black
        run: |
          black --line-length 88 --target-version py312 .
          git diff > /tmp/black.diff
          if [ -s /tmp/black.diff ]; then
            echo "::error title=Black reformatted files::$(cat /tmp/black.diff | head -c 65000)"
            echo "## Black reformatted these files" >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/black.diff >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Run flake8
        run: flake8 .

      - name: Run mypy
        run: mypy .
