name: Pytest CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas ta scikit-learn pytest

      - name: Run tests
        run: pytest -q

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy

      - name: Run black, flake8 and mypy
        run: |
          black --check .
          flake8 .
          mypy .
