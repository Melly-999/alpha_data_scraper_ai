name: Pytest CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'
          cache: pip

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Verify runtime imports
        run: |
          python - <<'PY'
          import importlib
          modules = [
              'numpy',
              'pandas',
              'sklearn',
              'indicators',
              'lstm_model',
              'signal_generator',
          ]
          for name in modules:
              importlib.import_module(name)
          print('Import check OK')
          PY

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -q

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'
          cache: pip

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run black
        run: |
          python --version
          black --version
          black --check --diff . 2>&1 | tee /tmp/black.diff || {
            echo "## Black formatting failures" >> "$GITHUB_STEP_SUMMARY"
            echo '```diff' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/black.diff >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Run flake8
        run: flake8 .

      - name: Run mypy
        run: mypy .
