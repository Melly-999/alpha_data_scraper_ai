name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 3 * * 1"   # every Monday at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # for CodeQL / SARIF upload

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bandit-sast:
    name: Bandit SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -r . \
            --exclude .venv,tests,node_modules \
            --severity-level medium \
            --confidence-level medium \
            --format json \
            --output bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Fail on high severity issues
        run: |
          bandit -r . \
            --exclude .venv,tests,node_modules \
            --severity-level high \
            --confidence-level high

  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          # These advisories are fixed only in versions requiring Python>=3.10.
          # This project validates CI/runtime on Python 3.9, so keep the latest
          # compatible pins and ignore those advisories here.
          pip-audit \
            --requirement requirements-ci.txt \
            --format json \
            --output pip-audit-report.json \
            --ignore-vuln GHSA-gc5v-m9x4-r6x2 \
            --ignore-vuln GHSA-6w46-j5rx-g56g \
            --ignore-vuln GHSA-3936-cmfr-pm3m \
            --ignore-vuln GHSA-cfh3-3jmp-rvhc \
            --ignore-vuln GHSA-whj4-6x5x-4v2j \
            --skip-editable

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
