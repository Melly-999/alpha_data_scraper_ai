<?xml version="1.0" encoding="UTF-8"?>
<!--
  Melly Pet desktop app icon source — 1024x1024.

  Original MellyTrade mascot, extracted verbatim from the in-product figure in
  frontend/src/components/branding/MellyPetMascot.tsx (MellyFigure, viewBox 0 0 80 92).
  Centered on the app's branded dark rounded square (theme #0a0d11 + amber accent)
  so the mascot stays visible as a Windows EXE / taskbar / window icon.

  This is a design-only asset. No third-party brand assets. No trading controls.
  Regenerate icon outputs with:  npx tauri icon frontend/src-tauri/melly-pet-icon.svg.png
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
