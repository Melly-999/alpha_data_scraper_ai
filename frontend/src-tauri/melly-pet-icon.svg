  <rect x="32" y="32" width="960" height="960" rx="180" fill="#0a0d11" />
  <rect x="32" y="32" width="960" height="960" rx="180" stroke="rgba(214,164,76,0.28)" stroke-width="6" />
  <ellipse cx="512" cy="500" rx="360" ry="400" fill="rgba(214,164,76,0.05)" />

  <!-- Melly Pet figure (source viewBox 0 0 80 92), centered & scaled into the square -->
  <svg x="232" y="172" width="560" height="644" viewBox="0 0 80 92" fill="none">
    <ellipse cx="40" cy="46" rx="28" ry="32" fill="rgba(214,164,76,0.04)" />

    <rect x="18" y="54" width="44" height="34" rx="6" fill="#0d1016" />
